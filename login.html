<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login / Create Account | PLAYFUNRBXSHOP</title>
    <link rel="stylesheet" href="/_next/static/css/7e7d96b1e6991756.css">
    <link rel="stylesheet" href="/_next/static/css/35a6a0f46849ce1f.css">
    <style>
        :root {
            --primary: #00A2FF;
            --bg: #0f1011;
            --card: #1c1e21;
            --text: #ffffff;
            --text-dim: #9aa0a6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 30px;
        }

        .logo img {
            height: 40px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #2a2d31;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-size: 16px;
        }

        .btn-primary:hover {
            background: #0088d6;
            transform: translateY(-2px);
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            color: var(--text-dim);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 10px;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn-discord:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .back-home {
            display: block;
            margin-top: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover {
            color: var(--primary);
        }

        #create-account-form {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <a href="/" class="logo">
            <img src="/icon/logo.png" alt="Logo">
            PLAYFUNRBXSHOP
        </a>

        <div id="login-form">
            <h1>Welcome Back</h1>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Login to access your dashboard.</p>
            
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" placeholder="Enter your username">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button onclick="window.location.href='/dashboard'" class="btn-primary">Login</button>

            <div class="divider"><span>OR</span></div>

            <a href="/dashboard" class="btn-discord">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.947 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.086 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/></svg>
                Login with Discord
            </a>

            <div class="toggle-text">
                Don't have an account? <a href="#" onclick="showCreateAccount()">Create Account</a>
            </div>
        </div>

        <div id="create-account-form">
            <h1>Create Account</h1>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Join the community today.</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Choose a username">
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="your@email.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button onclick="window.location.href='/dashboard'" class="btn-primary">Create Account</button>

            <div class="toggle-text">
                Already have an account? <a href="#" onclick="showLogin()">Login</a>
            </div>
        </div>

        <a href="/" class="back-home">← Back to Homepage</a>
    </div>

    <script>
        function showCreateAccount() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('create-account-form').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('create-account-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }
    </script>
</body>
</html>
